<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>리워드 상세 내역</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: white;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .detail-container {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      position: relative;
      padding: 0 20px;
      padding-bottom: 120px;
    }
    .header-back {
      padding: 20px 0;
      font-size: 24px;
      color: #333;
      text-decoration: none;
      display: inline-block;
    }
    .main-content {
      text-align: center;
      padding: 60px 0 40px 0;
    }
    .reward-icon {
      width: 80px;
      height: 80px;
      background: #4a9b8e;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .reward-icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    .reward-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 24px;
      height: 24px;
      background: #333;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      border: 2px solid #f8f9fa;
    }
    .reward-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .reward-amount {
      font-size: 36px;
      color: #333;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .reward-currency {
      font-size: 16px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .reward-krw {
      font-size: 14px;
      color: #666;
    }
    .transfer-container {
      margin: 0 0 20px 0;
    }
    .transfer-card {
      background: #f5f5f5;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .profile-item {
      display: flex;
      align-items: center;
      flex: 1;
    }
    .profile-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .unifi-icon {
      background: linear-gradient(135deg, #4fc3f7, #29b6f6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }
    .me-icon {
      background: linear-gradient(135deg, #e91e63, #ad1457);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }
    .profile-info {
      flex: 1;
    }
    .profile-name {
      font-size: 16px;
      color: #333;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .profile-address {
      font-size: 12px;
      color: #666;
    }
    .arrow-icon {
      margin: 0 20px;
      color: #999;
      font-size: 20px;
      flex-shrink: 0;
    }
    .info-section {
      margin: 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      font-size: 14px;
      color: #666;
    }
    .info-value {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .bottom-button {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 20px;
      background: white;
    }
    .confirm-btn {
      width: 100%;
      padding: 16px;
      background: #333;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .home-indicator {
      width: 134px;
      height: 5px;
      background: #333;
      border-radius: 3px;
      margin: 16px auto 0;
    }
  </style>
</head>
<body>

  <div class="detail-container">

    <!-- 헤더 -->
    <a href="reward_history.html" class="header-back">&lt;</a>

    <!-- 메인 콘텐츠 -->
    <div class="main-content">
      <div class="reward-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
        </svg>
        <div class="reward-badge">6</div>
      </div>

      <div class="reward-title">입금</div>
      <div class="reward-amount" id="detail-amount">+$0</div>
      <div class="reward-currency" id="detail-currency">0 USDT</div>
      <div class="reward-krw" id="detail-krw">≈₩0</div>
    </div>

    <!-- 송금자/수신자 정보 -->
    <div class="transfer-container">
      <div class="transfer-card">
        <div class="profile-item">
          <div class="profile-icon unifi-icon">U</div>
          <div class="profile-info">
            <div class="profile-name">Unifi</div>
          </div>
        </div>
        <div class="arrow-icon">›</div>
        <div class="profile-item">
          <div class="profile-icon me-icon">나</div>
          <div class="profile-info">
            <div class="profile-name">나 (Me)</div>
            <div class="profile-address">0x5245...8b52</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 거래 정보 -->
    <div class="info-section">
      <div class="info-row">
        <span class="info-label">거래 유형</span>
        <span class="info-value">리워드 지급</span>
      </div>
      <div class="info-row">
        <span class="info-label">거래 일시</span>
        <span class="info-value" id="detail-date">2026-03-30 15:00</span>
      </div>
      <div class="info-row">
        <span class="info-label">보낸 사람</span>
        <span class="info-value">Unifi</span>
      </div>
    </div>

  </div>

  <!-- 하단 고정 버튼 -->
  <div class="bottom-button">
    <button id="btn-confirm" class="confirm-btn">확인</button>
    <div class="home-indicator"></div>
  </div>

  <script>
    // URL 파라미터에서 리워드 정보 가져오기
    function getRewardDataFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      return {
        title: urlParams.get('title') || 'USDT 리워드 지급',
        date: urlParams.get('date') || '2026-03-30 15:00',
        amount: parseFloat(urlParams.get('amount')) || 1
      };
    }

    // 페이지 렌더링
    function renderDetailPage() {
      const rewardData = getRewardDataFromURL();

      // 금액 표시 (+$ 형태로)
      document.getElementById('detail-amount').textContent = `+$${rewardData.amount}`;
      document.getElementById('detail-currency').textContent = `${rewardData.amount} USDT`;
      document.getElementById('detail-krw').textContent = `≈₩${(rewardData.amount * 1350).toLocaleString('ko-KR', {maximumFractionDigits: 0})}`;

      // 거래 일시 표시
      document.getElementById('detail-date').textContent = rewardData.date;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderDetailPage();

      // 확인 버튼 클릭 시 이전 페이지로 이동
      document.getElementById('btn-confirm').addEventListener('click', () => {
        history.back();
      });
    });
  </script>

</body>
</html>
