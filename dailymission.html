<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일일 미션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-green': '#00c880',
                        'brand-blue': '#3b82f6',
                        'highlight-red': '#ff3b30',
                        'bg-main': '#ffffff',
                        'text-main': '#111111',
                        'text-sub': '#666666'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f6f8; margin: 0; padding: 0; color: var(--text-main); }
        
        /* PC 환경 대응: 중앙 정렬 및 너비 고정 */
        .app-wrapper { width: 100%; max-width: 480px; margin: 0 auto; background-color: #d1f4df; min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); overflow-x: hidden; display: flex; flex-direction: column; }
        
        /* 배경 그라데이션 */
        .bg-gradient-top { background: linear-gradient(180deg, #d1f4df 0%, #eaf8ee 40%, #f5f6f8 100%); flex: 1; padding-bottom: 50px; }

        /* 카드 공통 */
        .mission-card { background: white; border-radius: 24px; padding: 24px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin: 0 20px 16px 20px; position: relative;}

        /* 테스트 버튼 그룹 (우측 상단) */
        .test-controls { position: absolute; top: 24px; right: 20px; display: flex; gap: 4px; }
        .test-btn { background: #f0f0f0; color: #555; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
        .test-btn:active { transform: scale(0.95); }

        /* 프로그레스 바 라인 */
        .progress-line-bg { position: absolute; top: 16px; left: 24px; right: 24px; height: 3px; background: #f0f0f0; z-index: 1; }
        .progress-line-fill { position: absolute; top: 16px; left: 24px; height: 3px; background: var(--brand-green); z-index: 2; transition: width 0.4s ease; }

        /* 노드 기본 */
        .node-circle { width: 34px; height: 34px; border-radius: 50%; background: #ffffff; border: 2px solid #e5e7eb; color: transparent; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; transition: all 0.3s; position: relative; z-index: 3; box-sizing: border-box; }
        .node-img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; z-index: 3; position: relative; box-shadow: 0 0 0 2px var(--brand-green); }
        .node-label { font-size: 12px; font-weight: 800; color: #bbb; margin-top: 8px; }

        /* 노드 상태별 속성 (출석 완료 디자인 완벽 동기화) */
        .step.done .node-circle { background: var(--brand-green); border-color: var(--brand-green); color: white; border-width: 0; }
        .step.done .node-label { color: var(--text-main); font-weight: 900; }
        
        .step.ticket-future .node-circle { background: #fff8e1; border-color: #fff8e1; color: #ffb300; font-size: 16px; }
        .step.ticket-future .node-label { color: #ffb300; font-weight: 900; }

        /* 툴팁 뱃지 (뽑기권 3개) */
        .ticket-badge { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); background: white; border: 1.5px solid #111; color: #111; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 12px; white-space: nowrap; z-index: 10; }
        .ticket-badge::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-width: 4px 4px 0; border-style: solid; border-color: #111 transparent transparent transparent; }

        /* 하단 게임 리스트 */
        .game-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; cursor: pointer; transition: active 0.1s; }
        .game-row:active { transform: scale(0.98); }

        /* 모달 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 32px 24px; border-radius: 24px; text-align: center; width: 280px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="bg-gradient-top">
        
        <div class="px-5 pt-6 pb-6">
            <div class="flex justify-between items-start mb-6">
                <button onclick="window.location.href='index.html'" class="text-text-main p-1 -ml-1 transition transform active:scale-90">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                </button>
            </div>
            
            <div class="flex items-end justify-between">
                <div class="flex flex-col gap-1">
                    <div class="text-[13px] text-text-sub font-bold tracking-tight flex items-center gap-1" id="countdownTimer">
                        00:00:00 남음
                    </div>
                    <h1 class="text-[28px] font-black text-text-main tracking-tight">일일 미션</h1>
                </div>
                
                <div class="flex items-center gap-3 bg-[#eaf8ee] px-3 py-1.5 rounded-full shadow-sm border border-brand-green/20">
                    <div class="flex items-center gap-1.5">
                        <div class="w-5 h-5 rounded-full border-2 border-[#111] flex items-center justify-center text-[10px] font-black text-[#111]">₮</div>
                        <span id="topUsdt" class="font-extrabold text-[13px] text-[#111]">5.00 USDT</span>
                    </div>
                    <div class="w-[1px] h-3 bg-gray-300"></div>
                    <div class="flex items-center gap-1.5">
                        <div class="w-5 h-5 rounded-[6px] border-2 border-[#111] flex items-center justify-center text-[10px] font-black text-[#111]">★</div>
                        <span id="topTicket" class="font-extrabold text-[13px] text-[#111]">3개</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mission-card">
            <div class="test-controls">
                <button onclick="testAttReset()" class="test-btn">초기화</button>
                <button onclick="testAtt3()" class="test-btn">3일 완료</button>
                <button onclick="testAtt5()" class="test-btn">5일 완료</button>
            </div>

            <h2 class="text-[18px] font-black text-text-main mb-1">출석 체크</h2>
            <p class="text-[13px] font-semibold text-text-sub mb-8 mt-1">5일 연속 출석 체크하고 USDT 뽑기권 받아요</p>

            <div class="relative flex justify-between px-2 mb-8" id="attStepsContainer">
                <div class="progress-line-bg"></div>
                <div class="progress-line-fill" id="attLineFill" style="width: 0%;"></div>
                </div>

            <button id="btnAttendAction" class="w-full bg-black text-white font-extrabold text-[15px] py-4 rounded-[16px] transition active:scale-95 disabled:bg-[#f5f6f8] disabled:text-[#a0a0a0] disabled:cursor-not-allowed disabled:active:scale-100">
                출석하고 1 USDT 받기
            </button>
        </div>

        <div class="mission-card">
            <div class="test-controls">
                <button onclick="testGameReset()" class="test-btn">초기화</button>
                <button onclick="testGame3()" class="test-btn">3개 완료</button>
            </div>

            <h2 class="text-[18px] font-black text-text-main mb-1">게임 미션</h2>
            <p class="text-[13px] font-semibold text-text-sub mb-8 mt-1">게임 3개 미션 완료하고 USDT 뽑기권 받아요</p>

            <div class="relative flex justify-between px-6 mb-6" id="gameStepsContainer">
                <div class="progress-line-bg" style="left:40px; right:40px;"></div>
                <div class="progress-line-fill" id="gameLineFill" style="left:40px; width: 0%;"></div>
                </div>

            <div id="gameListContainer" class="flex flex-col mt-2">
                </div>
        </div>

    </div>
</div>

<div class="modal-overlay" id="commonModal">
    <div class="modal-content">
        <div class="modal-icon" id="modalIcon">🎉</div>
        <div class="modal-title" id="modalTitle">축하합니다!</div>
        <div class="modal-desc" id="modalDesc">보상을 획득했습니다.</div>
        <button class="bg-text-main text-white border-none py-3.5 px-6 w-full rounded-[16px] font-extrabold text-[15px] cursor-pointer transition active:scale-95" onclick="closeCommonModal()">확인</button>
    </div>
</div>

<script>
    // 초기 상태: 출석 1일 완료, 게임 미션 진행 전
    let state = {
        totalUsdt: 5.00,
        luckyTickets: 3,
        attendance: { days: 1, todayChecked: false }, 
        miniGames: [
            { id: 1, name: "Squishy Cat", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hDcqSN6NCG0xMKgSacZ1kGxZ_FT0gWwJZNRwJNDFvESB_SAcbNTMidypCRhckTzp9LTIhUSp5JxcqezpbNjMMQWhLI309TzkbORwfSTFVIykpSQBIOzMPWi9RGSZpZiw" },
            { id: 2, name: "Tap Tap Jello", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hkv6lhvyZNFkLFSuPNoxLDlFAOihnZC1MciMmIXZQPjU4dygOcgwgXHNFAw58WjhvfgwwTHBHCAJtRBVOcQwjVC90DGh6cBYOfiMwXHZqDA5kdyhvNhsnbWhuNjMuWQM" },
            { id: 3, name: "Merge Cat", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hmpC2SfwtMl9-Sy2JQ-5NCCYePC4SOitKB30gJwMOODNNKS4IQ38IUgQjbwsaExNACVImYBswMxNbKyp5QVYiWVMYDgRTGhB-AVILQVsbNwwSKD51QVEISQcbCW4V" },
            { id: 4, name: "Hook & Gold", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hDl60raRTG0MLSQRmOMlkFFEcFTJnOAJWcn8JO3YMES84KwcUclNWVmg2PBAmBSoQfkQITmUiDRhtGDpUcVAMTi8oI3J6LDkUfn8PfysiMBR-ETocNnwxVWgyGSkuBSw" },
            { id: 5, name: "Rich Match", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hxTE3b46CJ3t4SjiRKiFYLCIfKQoUOz5uAXw1AwUPLRdLKDssAVAORBsYegoNKWMsDH4eHR4aGyAeGwZsAlMwdlwrH0oJLwUsDXw3Zh0iEDgVETwkRURrTxQxJRFdBhA" },
            { id: 6, name: "Soda King", done: false, claimed: false, img: "https://obs.line-scdn.net:443/0hbiCjSLeSPUZ-EyONi5JCESZGMzcSYiRTByUvPgNWNypNcSERCyAHXwJsBR4YcQ9nQgkHSwRoPApbcyVgQQ4tQFNAAR1TQh9nAwoLVFhBFXIaSDF0RwkHUAdDBncV" }
        ],
        gameMasterClaimed: false
    };

    function renderAssets() {
        document.getElementById('topUsdt').innerText = `${state.totalUsdt.toFixed(2)} USDT`;
        document.getElementById('topTicket').innerText = `${state.luckyTickets}개`;
    }

    // 자정 타이머
    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
        const m = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
        const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        document.getElementById('countdownTimer').innerText = `${h}:${m}:${s} 남음`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // ==========================================
    // 1. 출석체크 로직
    // ==========================================
    function renderAttendance() {
        const att = state.attendance;
        // 게이지 바 계산 (1일차 0%, 2일차 25%, 5일차 100%)
        const fillPercentage = Math.min(Math.max((att.days - 1) / 4 * 100, 0), 100);
        document.getElementById('attLineFill').style.width = `${fillPercentage}%`;
        
        let stepsHtml = '';
        for (let i = 1; i <= 5; i++) {
            let isDone = i <= att.days;
            let sC = '', cC = '', badge = '';
            
            if (i === 5) badge = `<div class="ticket-badge">뽑기권 3개</div>`;
            
            // 3, 5일차는 특별 아이콘 유지하거나, 달성 시 녹색 체크마크로 변환
            if (isDone) {
                sC = 'done'; 
                cC = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"></path></svg>`;
            } else if (i === 3 || i === 5) {
                sC = 'ticket-future'; cC = '★'; 
            } else {
                sC = 'future'; cC = '';
            }
            
            stepsHtml += `
                <div class="step ${sC} flex flex-col items-center relative z-10 w-[40px]">
                    ${badge}
                    <div class="node-circle">${cC}</div>
                    <div class="node-label">${i}일</div>
                </div>
            `;
        }
        document.getElementById('attStepsContainer').innerHTML = stepsHtml;

        const btn = document.getElementById('btnAttendAction');
        if (att.todayChecked || att.days >= 5) {
            btn.disabled = true;
            btn.innerHTML = '오늘의 출석 완료 👏';
        } else {
            btn.disabled = false;
            let rewardText = '1 USDT';
            if (att.days === 2) rewardText = '뽑기권 1개';
            if (att.days === 4) rewardText = '뽑기권 3개';
            btn.innerHTML = `출석하고 ${rewardText} 받기`;
            btn.onclick = handleAttendance;
        }
    }

    function handleAttendance() {
        state.attendance.todayChecked = true;
        state.attendance.days += 1;
        let d = state.attendance.days;
        
        if (d === 3) {
            state.luckyTickets += 1;
            showCommonModal('🎁 출석 완료!', `3일 연속 출석 달성!<br><strong style="color:var(--brand-green); font-size:18px;">뽑기권 1개</strong>를 획득했습니다.`);
        } else if (d === 5) {
            state.luckyTickets += 3;
            showCommonModal('🎁 출석 완료!', `5일 연속 출석 달성!<br><strong style="color:var(--brand-green); font-size:18px;">뽑기권 3개</strong>를 획득했습니다.`);
        } else {
            state.totalUsdt += 1; 
            showCommonModal('🪙 출석 완료!', `오늘 출석 완료.<br><strong style="color:var(--brand-green); font-size:18px;">1 USDT</strong>를 획득했습니다.`);
        }
        renderAssets();
        renderAttendance();
    }

    // 출석체크 테스트 버튼 함수
    window.testAttReset = function() { state.attendance = {days:1, todayChecked:false}; renderAttendance(); };
    window.testAtt3 = function() { state.attendance = {days:2, todayChecked:false}; renderAttendance(); };
    window.testAtt5 = function() { state.attendance = {days:4, todayChecked:false}; renderAttendance(); };


    // ==========================================
    // 2. 게임 미션 로직 (보상 수령(Claim) 기준)
    // ==========================================
    function renderGames() {
        // [보상을 수령한] 미션 개수만큼 게이지 바 증가
        const claimedCount = state.miniGames.filter(g => g.claimed).length;
        const progressCount = Math.min(claimedCount, 3); 
        
        document.getElementById('gameLineFill').style.width = `${(progressCount / 2) * 100}%`;

        // 3개 노드 렌더링
        let gameStepsHtml = '';
        for (let i = 0; i < 3; i++) {
            let nodeContent = '';
            let badge = '';

            if (i === 2) {
                badge = `<div class="ticket-badge">뽑기권 3개</div>`;
            }
            
            // 수령 완료 시 아바타 이미지로 변환, 미완료 시 빈 노드/별 모양 유지
            if (i < progressCount) {
                const claimedGames = state.miniGames.filter(g => g.claimed);
                nodeContent = `<img src="${claimedGames[i].img}" class="node-img">`;
            } else if (i === 2) {
                nodeContent = `<div class="node-circle" style="background:#fff8e1; border:2px solid #fff8e1; color:#ffb300; font-size:16px;">★</div>`;
            } else {
                nodeContent = `<div class="node-circle" style="border-color:#e5e7eb; background:white;"></div>`;
            }

            gameStepsHtml += `
                <div class="flex flex-col items-center relative z-10 w-[50px]">
                    ${badge}
                    ${nodeContent}
                    <div class="node-label font-extrabold ${i < progressCount ? 'text-text-main' : 'text-gray-300'}">게임 ${i+1}개</div>
                </div>
            `;
        }
        document.getElementById('gameStepsContainer').innerHTML = gameStepsHtml;

        // 3개 보상 수령 시 팝업
        if (progressCount === 3 && !state.gameMasterClaimed) {
            state.gameMasterClaimed = true;
            state.luckyTickets += 3;
            renderAssets();
            showCommonModal('🎁 미션 달성!', `게임 3개 미션 보상을 모두 수령하여<br><strong style="color:var(--brand-green); font-size:18px;">뽑기권 3개</strong>를 추가 획득했습니다.`);
        }

        // 하단 게임 리스트 렌더링
        document.getElementById('gameListContainer').innerHTML = state.miniGames.map((mg, i) => {
            let statusText = '';
            let statusColor = '';
            let rightUI = '';

            if (mg.claimed) {
                statusText = '미션 완료';
                statusColor = 'text-brand-green';
                rightUI = `<span class="text-gray-300 font-extrabold text-[13px] px-3">2 USDT 받음</span>`;
            } else if (mg.done) {
                statusText = '미션 완료';
                statusColor = 'text-brand-green';
                rightUI = `<button onclick="claimGameReward(event, ${i})" class="bg-black text-white px-5 py-2.5 rounded-full font-extrabold text-[13px] shadow-sm transition active:scale-95 animate-pulse">2 USDT 받기</button>`;
            } else {
                statusText = '0/3 미션 진행 전'; 
                statusColor = 'text-gray-400';
                rightUI = ``; 
            }

            return `
                <div class="game-row" onclick="toggleGameDone(${i})">
                    <div class="flex items-center gap-3">
                        <img src="${mg.img}" class="w-[46px] h-[46px] rounded-full object-cover shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-gray-50">
                        <div class="flex flex-col gap-0.5">
                            <span class="text-[15px] font-black text-text-main tracking-tight">${mg.name}</span>
                            <span class="text-[12px] font-extrabold ${statusColor}">${statusText}</span>
                        </div>
                    </div>
                    <div>${rightUI}</div>
                </div>
            `;
        }).join('');
    }

    // 리스트 클릭 -> 게임 플레이 완료 처리 (테스트용)
    window.toggleGameDone = function(i) {
        if (state.miniGames[i].done) return; 
        state.miniGames[i].done = true;
        renderGames();
    };

    // 2 USDT 받기 버튼 클릭 -> 보상 수령 및 게이지 바 증가
    window.claimGameReward = function(e, i) {
        e.stopPropagation(); 
        state.miniGames[i].claimed = true;
        state.totalUsdt += 2;
        renderAssets();
        renderGames();
        showCommonModal('💸 보상 수령!', `<strong>${state.miniGames[i].name}</strong> 완료 보상으로<br><strong style="color:var(--brand-green); font-size:18px;">2 USDT</strong>를 획득했습니다.`);
    };

    // 게임 테스트 버튼 함수
    window.testGameReset = function() { 
        state.miniGames.forEach(g => {g.done=false; g.claimed=false;}); 
        state.gameMasterClaimed = false; 
        renderGames(); 
    };
    
    window.testGame3 = function() { 
        // 3개 게임을 완료(done)했지만 아직 보상은 안 받은(claimed=false) 상태로 세팅하여
        // 유저가 직접 [2 USDT 받기]를 누르며 게이지가 차오르는 것을 확인 가능하게 함
        state.miniGames.forEach((g,i) => {
            if(i < 3) { g.done = true; g.claimed = false; } 
            else { g.done = false; g.claimed = false; }
        });
        state.gameMasterClaimed = false; 
        renderGames(); 
    };

    // 공통 모달 노출
    function showCommonModal(title, desc, icon = '🎉') { 
        document.getElementById('modalTitle').innerHTML = title; 
        document.getElementById('modalDesc').innerHTML = desc; 
        document.getElementById('modalIcon').innerText = icon; 
        document.getElementById('commonModal').style.display = 'flex'; 
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#00c880', '#1976d2', '#ffd700', '#ffffff'] }); 
    }
    function closeCommonModal() { document.getElementById('commonModal').style.display = 'none'; }

    // 초기화
