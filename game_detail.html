<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 상세</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    
    <div style="height: 200px; background-color: #ffd1dc; position: relative;">
      <div class="header">
        <a href="daily_mission.html" class="back-btn" style="color: #fff;">&lt;</a>
      </div>
    </div>

    <div style="padding: 20px;">
      <h1 class="font-black text-main">Merge Cat</h1>
      <p class="text-sub mt-10">Game · 320명 참여 중</p>
      
      <div class="flex-between mt-20" style="padding-bottom: 10px; border-bottom: 1px solid var(--border-color);">
        <h3 class="font-extrabold">일일 미션</h3>
        <p class="text-sub">01:30:59</p>
      </div>

      <div class="mt-20">
        <div class="flex-between" style="background: var(--gray-bg); padding: 16px; border-radius: 16px; margin-bottom: 10px;">
          <div>
            <p class="font-semibold text-main">고양이 합치기</p>
            <p class="text-sub">30/30 (완료)</p>
          </div>
          <button class="btn" style="background: #e0e0e0; color: #888; padding: 8px 16px;">완료</button>
        </div>

        <div class="flex-between" style="background: var(--gray-bg); padding: 16px; border-radius: 16px;">
          <div>
            <p class="font-semibold text-main">박스 파괴하기</p>
            <p class="text-sub">0/100</p>
          </div>
          <button class="btn" style="background: #000; color: #fff; padding: 8px 16px;">시작</button>
        </div>
      </div>

      <div class="mt-20">
         <button class="btn" style="background: #e0e0e0; color: #888; width: 100%; padding: 16px; border-radius: 24px;">2 USDT 받기</button>
      </div>
    </div>

  </div>
</body>
</html>
