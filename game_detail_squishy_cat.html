<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>게임 상세 - Squishy Cat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 개별 게임 상세 전용 스타일 */
    body { background-color: var(--e0e0e0); margin: 0; display: flex; justify-content: center; }
    
    .cover-img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .cover-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 10; padding-top: max(20px, env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; }
    .back-btn-white { color: #fff; font-size: 28px; font-weight: 300; text-decoration: none; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    
    /* 콘텐츠 컨테이너 (위로 겹쳐 올라오는 형태) */
    .game-info-container { 
      background: var(--app-bg); border-radius: 24px 24px 0 0; 
      position: relative; margin-top: -24px; padding: 30px 20px; padding-bottom: 120px; 
    }
    
    /* 보조 배너 (하트 받기) */
    .sub-banner {
      background-color: var(--mint-bg); border-radius: 16px; padding: 14px 20px; 
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
    }

    /* 미션 리스트 카드 */
    .mission-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .mission-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .mission-item:last-child { margin-bottom: 0; }
    
    /* 아이콘 영역 */
    .mission-icon { 
      width: 48px; height: 48px; border-radius: 50%; background: var(--gray-bg); 
      display: flex; justify-content: center; align-items: center; font-size: 24px; margin-right: 14px; position: relative; 
    }
    .mission-icon .check-badge { 
      position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; 
      background: var(--text-main); color: #fff; border-radius: 50%; font-size: 10px; 
      display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #fff; 
    }
    
    /* 상태별 버튼 디자인 */
    .btn-status { padding: 8px 18px; border-radius: 16px; font-size: 13px; font-weight: 800; transition: transform 0.1s; }
    .btn-status:active { transform: scale(0.95); }
    
    .btn-status.start { background-color: var(--text-main); color: #fff; border: none; }
    .btn-status.ing { background-color: #fff; color: var(--text-main); border: 1px solid #ddd; }
    .btn-status.done { background-color: var(--gray-bg); color: #a0a0a0; border: none; pointer-events: none; }
    
    /* 하단 고정 바 */
    .bottom-fixed { 
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); 
      width: 100%; max-width: 480px; background: #fff; 
      padding: 12px 20px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
      display: flex; gap: 12px; box-sizing: border-box; 
      border-top: 1px solid var(--border-color); z-index: 100; 
      box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
    }
    .btn-line { 
      flex: 1; max-width: 140px; background: var(--gray-bg); color: var(--text-main); 
      border-radius: 16px; font-weight: 800; font-size: 15px; 
      display: flex; justify-content: center; align-items: center; gap: 6px; border: none; cursor: pointer; padding: 16px 0; transition: transform 0.1s;
    }
    .btn-line:active { transform: scale(0.95); }
    .btn-play-game { 
      flex: 2; background: var(--text-main); color: #fff; border-radius: 16px; 
      font-weight: 800; font-size: 16px; border: none; cursor: pointer; padding: 16px 0; transition: transform 0.1s;
    }
    .btn-play-game:active { transform: scale(0.95); }

    /* 게임 소개 태그 */
    .tag-list { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .tag { font-size: 12px; font-weight: 600; color: var(--text-sub); background: var(--gray-bg); padding: 6px 10px; border-radius: 8px; }
  </style>
</head>
<body>
  
  <div class="app-container" style="padding-bottom: 0; min-height: auto;">
    
    <div style="position: relative;">
      <div class="cover-header">
        <a href="daily_mission.html" class="back-btn-white">&lt;</a>
      </div>
      <img src="https://obs.line-scdn.net:443/0hVsh0TmebCVxVSRag5O52Cw8cBy05OBBJLH8bJCgMAzBmKxULLFAae3E3Pgt7KjhUIlEwTnAiHwczGChLL1AeUXEoMW0kLCsLIH8ZUjsZMjE-KgVcaH0jSjYyCzZwBT4" alt="Squishy Cat Cover" class="cover-img">
    </div>

    <div class="game-info-container">
      
      <div class="flex-between">
        <h1 class="font-black text-main" style="font-size: 28px;">Squishy Cat</h1>
        <span style="font-size: 24px; color: #ddd; cursor: pointer;">♡</span>
      </div>
      <p class="text-sub mt-10 font-semibold" style="font-size: 13px;">Game · 320명 참여 중</p>

      <div class="flex-between mt-40 mb-20">
        <h3 class="font-extrabold text-main" style="font-size: 18px;">일일 미션</h3>
        <span class="text-sub font-semibold" style="font-size: 13px;" id="countdown-timer">01:30:59 남음</span>
      </div>

      <div class="sub-banner">
        <span class="font-extrabold text-main" style="font-size: 15px;">하트 10개 받기</span>
        <button class="btn-black" style="padding: 8px 16px; font-size: 13px; border-radius: 20px; width: auto;">받기</button>
      </div>

      <div class="mission-card">
        
        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon" style="background:#fff3e0;">🐱<div class="check-badge">✓</div></div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">고양이 합치기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">30/30</span>
            </div>
          </div>
          <button class="btn-status done">완료</button>
        </div>

        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon" style="background:#e0f2f1;">🐟</div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">물고기 먹이기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">30/50</span>
            </div>
          </div>
          <button class="btn-status ing">진행 중</button>
        </div>

        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon" style="background:#fce4ec;">📦</div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">박스 파괴하기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">0/100</span>
            </div>
          </div>
          <button class="btn-status start">시작</button>
        </div>

        <button class="btn-play" style="background: var(--gray-bg); color: #a0a0a0; margin-top: 24px; padding: 16px 0; border-radius: 20px; font-size: 15px; font-weight: 800; cursor: not-allowed;" disabled>2 USDT 받기</button>
      </div>

      <h3 class="font-extrabold text-main mt-40 mb-20" style="font-size: 18px;">게임 소개</h3>
      <div class="mission-card" style="box-shadow: none; border: 1px solid var(--border-color);">
        <h4 class="font-extrabold text-main" style="font-size: 16px; margin-bottom: 12px; line-height: 1.4;">귀여운 고양이를 합칠수록<br>점점 더 커지는 재미!</h4>
        <p class="text-sub" style="font-size: 13px; line-height: 1.6;">귀여운 캐릭터를 하나씩 합쳐보세요! 점점 더 특별한 모습으로 변해가는 재미를 느낄 수 있어요. 누구나 쉽게 즐길 수 있는 힐링 게임입니다.</p>
        
        <div class="tag-list">
          <span class="tag">#캐주얼</span>
          <span class="tag">#심플</span>
          <span class="tag">#큐트</span>
        </div>
      </div>

    </div>
  </div>

  <div class="bottom-fixed">
    <button class="btn-line">
      <span style="color:#00c300; font-size: 18px; line-height: 1;">💬</span> 공식 계정
    </button>
    <button class="btn-play-game">플레이</button>
  </div>

  <script>
    // 동적 타이머 구동 로직 (일일 미션과 동일하게 자정 기준)
    document.addEventListener('DOMContentLoaded', () => {
      function updateTimer() {
        const now = new Date();
        const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
        const diff = midnight - now;
        
        const h = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
        const m = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
        const s = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
        
        const timerEl = document.getElementById('countdown-timer');
        if(timerEl) timerEl.innerText = `${h}:${m}:${s} 남음`;
      }
      setInterval(updateTimer, 1000);
      updateTimer();
    });
  </script>
</body>
</html>
