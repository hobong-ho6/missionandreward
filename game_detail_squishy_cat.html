<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>게임 상세 - Squishy Cat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cover-img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .cover-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 10; padding-top: max(20px, env(safe-area-inset-top)); }
    .back-btn-white { color: #fff; font-size: 24px; text-decoration: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); display: inline-block; }
    .game-info-container { background: var(--app-bg); border-radius: 24px 24px 0 0; position: relative; margin-top: -24px; padding: 24px 20px; padding-bottom: 120px; }
    
    .mission-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
    .mission-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .mission-item:last-child { margin-bottom: 0; }
    .mission-icon { width: 44px; height: 44px; border-radius: 50%; background: #f5f6f8; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-right: 14px; position: relative; }
    .mission-icon .check-badge { position: absolute; top: -2px; right: -2px; width: 16px; height: 16px; background: #111; color: #fff; border-radius: 50%; font-size: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #fff; }
    
    .btn-status { padding: 8px 16px; border-radius: 16px; font-size: 13px; font-weight: 800; border: 1px solid var(--border-color); color: var(--text-main); background: #fff; }
    .btn-status.done { background: var(--gray-bg); color: var(--text-sub); border: none; }
    
    .bottom-fixed { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; padding: 12px 20px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 12px; box-sizing: border-box; border-top: 1px solid var(--border-color); z-index: 100; }
    .btn-line { flex: 1; background: #f0f0f0; color: var(--text-main); border-radius: 16px; font-weight: 800; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 6px; border: none; cursor: pointer; padding: 16px 0; }
    .btn-play-game { flex: 1; background: #111; color: #fff; border-radius: 16px; font-weight: 800; font-size: 15px; border: none; cursor: pointer; padding: 16px 0; }
  </style>
</head>
<body style="background-color: var(--e0e0e0); margin: 0; display: flex; justify-content: center;">
  <div class="app-container" style="padding-bottom: 0; min-height: auto;">
    
    <div style="position: relative;">
      <div class="cover-header">
        <a href="daily_mission.html" class="back-btn-white">&lt;</a>
      </div>
      <img src="https://obs.line-scdn.net:443/0hVsh0TmebCVxVSRag5O52Cw8cBy05OBBJLH8bJCgMAzBmKxULLFAae3E3Pgt7KjhUIlEwTnAiHwczGChLL1AeUXEoMW0kLCsLIH8ZUjsZMjE-KgVcaH0jSjYyCzZwBT4" alt="Squishy Cat" class="cover-img">
    </div>

    <div class="game-info-container">
      <div class="flex-between">
        <h1 class="font-black text-main" style="font-size: 28px;">Squishy Cat</h1>
        <span style="font-size: 24px; color: #ccc;">❤</span>
      </div>
      <p class="text-sub mt-10" style="font-size: 13px;">Game · 320명 참여 중</p>

      <div class="flex-between mt-30 mb-10">
        <h3 class="font-extrabold text-main" style="font-size: 18px;">일일 미션</h3>
        <span class="text-sub font-semibold" style="font-size: 13px;">01:30:59</span>
      </div>

      <div style="background-color: var(--lime-bg); border-radius: 16px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span class="font-extrabold text-main" style="font-size: 15px;">하트 10개 받기</span>
        <button class="btn-black" style="padding: 8px 16px; font-size: 13px; border-radius: 20px;">받기</button>
      </div>

      <div class="mission-card">
        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon">🐱<div class="check-badge">✓</div></div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">고양이 합치기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">30/30</span>
            </div>
          </div>
          <button class="btn-status done">완료</button>
        </div>
        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon" style="background:#fff3e0;">🐟</div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">물고기 먹이기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">30/50</span>
            </div>
          </div>
          <button class="btn-status">진행 중</button>
        </div>
        <div class="mission-item">
          <div class="flex-row">
            <div class="mission-icon" style="background:#ffebee;">📦</div>
            <div class="flex-col">
              <span class="font-semibold text-main" style="font-size: 14px;">박스 파괴하기</span>
              <span class="font-extrabold text-main" style="font-size: 15px; margin-top: 4px;">0/100</span>
            </div>
          </div>
          <button class="btn-status">시작</button>
        </div>

        <button class="btn-play" style="background: var(--gray-bg); color: #a0a0a0; margin-top: 20px; padding: 16px 0; border-radius: 24px; font-size: 16px; cursor: not-allowed;" disabled>2 USDT 받기</button>
      </div>

      <h3 class="font-extrabold text-main mt-30 mb-10" style="font-size: 18px;">게임 소개</h3>
      <div class="mission-card" style="background: var(--gray-bg); box-shadow: none;">
        <h4 class="font-extrabold text-main" style="font-size: 16px; margin-bottom: 8px;">귀여운 고양이를 합칠수록<br>점점 더 커지는 재미!</h4>
        <p class="text-sub" style="font-size: 13px; line-height: 1.5;">귀여운 캐릭터를 하나씩 합쳐보세요! 점점 더 특별한 모습으로 변해가는 재미를 느낄 수 있어요. 누구나 쉽게 즐겨요.</p>
        <div class="flex-row mt-10" style="gap: 8px;">
          <span style="font-size: 11px; color: #888; background: #e0e0e0; padding: 4px 8px; border-radius: 8px;">#캐주얼</span>
          <span style="font-size: 11px; color: #888; background: #e0e0e0; padding: 4px 8px; border-radius: 8px;">#심플</span>
          <span style="font-size: 11px; color: #888; background: #e0e0e0; padding: 4px 8px; border-radius: 8px;">#큐트</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-fixed">
    <button class="btn-line"><span style="color:#00c300;">💬</span> 공식 계정</button>
    <button class="btn-play-game">플레이</button>
  </div>
</body>
</html>
